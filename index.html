<!DOCTYPE html>
<html>
<head>
    <title>SeeFix - Report Civic Issue</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-gray-200">

<div class="max-w-3xl mx-auto mt-16 bg-slate-800 p-10 rounded-xl shadow-lg">

    <!-- Header -->
    <h1 class="text-3xl font-bold text-center text-emerald-400 mb-3">
        SeeFix Civic Reporting
    </h1>

    <p class="text-center text-gray-400 mb-8">
        Help improve your city. Upload a photo of a pothole or garbage and our AI
        system will log the complaint to the municipal dashboard.
    </p>

    <!-- Form -->
    <form action="/upload" method="post" enctype="multipart/form-data" class="space-y-6">

        <div>
            <label class="block font-semibold mb-1">📍 Your Address</label>
            <input type="text" name="address" required
                   placeholder="Enter location of the issue"
                   class="w-full p-3 rounded bg-slate-700 border border-slate-600 focus:outline-none focus:border-emerald-400">
        </div>

        <div>
            <label class="block font-semibold mb-1">📷 Upload Issue Image</label>
            <input type="file" name="image" required
                   class="w-full p-2 rounded bg-slate-700 border border-slate-600">
        </div>

        <button class="w-full bg-emerald-500 text-white p-3 rounded-lg font-semibold hover:bg-emerald-600 transition">
            Submit Complaint
        </button>

    </form>

   

    <!-- Admin Login -->
    <div class="text-center mt-8">
        <a href="/login" class="text-emerald-400 hover:underline">
            Admin / User Login
        </a>
    </div>

    <!-- Footer -->
    <div class="text-center mt-6 text-gray-500 text-sm">
        Built by Anushka • AI Smart City Project
    </div>

</div>

</body>
</html>
