<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard • SeeFix</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-gray-200">

<div class="max-w-6xl mx-auto mt-12 bg-slate-800 p-10 rounded-xl shadow-lg">

    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold text-emerald-400">
            Admin Dashboard
        </h1>

        <a href="/logout"
           class="bg-red-500 hover:bg-red-600 px-5 py-2 rounded-lg">
           Logout
        </a>
    </div>

    <!-- Table -->
    <div class="overflow-x-auto">
        <table class="w-full border border-slate-700 rounded-lg overflow-hidden">

            <thead class="bg-slate-700">
                <tr>
                    <th class="p-3 text-left">ID</th>
                    <th class="p-3">Image</th>
                    <th class="p-3">Issue</th>
                    <th class="p-3">Address</th>
                    <th class="p-3">Urgency</th>
                    <th class="p-3">Severity</th>
                    <th class="p-3">Status</th>
                    <th class="p-3">Action</th>
                </tr>
            </thead>

            <tbody>
                {% for report in reports %}
                <tr class="border-t border-slate-700 text-center">

                    <td class="p-3">{{ report[0] }}</td>

                    <td class="p-3">
                        <img src="/{{ report[1] }}" width="120" class="mx-auto rounded">
                    </td>

                    <td class="p-3">{{ report[2] }}</td>
                    <td class="p-3">{{ report[3] }}</td>
                    <td class="p-3 font-semibold text-yellow-400">{{ report[4] }}</td>
                    <td class="p-3 text-emerald-400">{{ report[5] }}</td>
                    <td class="p-3">{{ report[6] }}</td>

                    <td class="p-3">
                        {% if report[6] != "Resolved" %}
                        <a href="/resolve/{{ report[0] }}"
                           class="bg-emerald-500 hover:bg-emerald-600 px-4 py-1 rounded">
                           Resolve
                        </a>
                        {% else %}
                        <span class="text-gray-400">Done</span>
                        {% endif %}
                    </td>

                </tr>
                {% endfor %}
            </tbody>

        </table>
    </div>

</div>

</body>
</html>
